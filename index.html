<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>G & E – A Gift for Us</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@900&family=DM+Sans:wght@400;600;700&family=Caveat:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <style>
    .reveal-page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: var(--spacing-lg);
      background: 
        radial-gradient(ellipse at center, rgba(45, 74, 46, 0.2) 0%, transparent 70%),
        var(--espresso);
      position: relative;
    }

    .reveal-content {
      max-width: 600px;
      opacity: 0;
      animation: fadeIn 2s ease-out 0.3s forwards;
    }

    .logo {
      font-family: var(--font-display);
      font-size: clamp(4rem, 12vw, 8rem);
      font-weight: 900;
      color: var(--cream);
      letter-spacing: 0.1em;
      margin-bottom: var(--spacing-md);
      text-shadow: 
        0 2px 4px rgba(0, 0, 0, 0.3),
        0 4px 12px rgba(196, 136, 58, 0.2);
      animation: pulse 3s ease-in-out infinite;
    }

    .ampersand {
      color: var(--amber);
      font-size: 1.2em;
      display: inline-block;
      margin: 0 0.2em;
    }

    .tagline {
      font-family: var(--font-handwritten);
      font-size: clamp(1.5rem, 4vw, 2.5rem);
      color: var(--amber);
      margin-bottom: var(--spacing-lg);
      opacity: 0;
      animation: fadeIn 2s ease-out 1s forwards;
      line-height: 1.4;
    }

    .subtitle {
      font-family: var(--font-body);
      font-size: 1.1rem;
      color: var(--cream);
      opacity: 0.8;
      margin-bottom: var(--spacing-xl);
      opacity: 0;
      animation: fadeIn 2s ease-out 1.5s forwards;
    }

    .enter-btn {
      opacity: 0;
      animation: fadeIn 1.5s ease-out 2s forwards;
      font-size: 1.3rem;
      padding: var(--spacing-md) var(--spacing-xl);
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    .decorative-line {
      width: 200px;
      height: 2px;
      background: linear-gradient(
        90deg,
        transparent 0%,
        var(--amber) 50%,
        transparent 100%
      );
      margin: var(--spacing-lg) auto;
      opacity: 0;
      animation: fadeIn 2s ease-out 1.2s forwards;
    }

    /* Easter egg: tiny dinosaur footprints scattered around */
    .footprint {
      position: absolute;
      width: 20px;
      height: 20px;
      opacity: 0.1;
      color: var(--forest);
    }

    .footprint-1 { top: 15%; left: 10%; transform: rotate(25deg); }
    .footprint-2 { top: 20%; left: 15%; transform: rotate(-15deg); }
    .footprint-3 { top: 75%; right: 12%; transform: rotate(45deg); }
    .footprint-4 { bottom: 15%; left: 8%; transform: rotate(-30deg); }
    .footprint-5 { top: 30%; right: 18%; transform: rotate(60deg); }
  </style>
</head>
<body>
  <div class="reveal-page">
    <!-- Dinosaur footprints easter egg -->
    <div class="footprint footprint-1">🦖</div>
    <div class="footprint footprint-2">🦕</div>
    <div class="footprint footprint-3">🐾</div>
    <div class="footprint footprint-4">🦖</div>
    <div class="footprint footprint-5">🐾</div>

    <div class="reveal-content">
      <h1 class="logo">
        G <span class="ampersand">&</span> E
      </h1>
      
      <div class="decorative-line"></div>
      
      <p class="tagline">
        A collection of games for two hearts,<br>
        3,896 miles apart
      </p>
      
      <p class="subtitle">
        Austin ↔ Hawaii<br>
        Made with love, cats, dinosaurs & thrifted treasures
      </p>
      
      <button class="btn btn-primary enter-btn" onclick="enterSite()">
        Come Inside
      </button>
    </div>
  </div>

  <script>
    function enterSite() {
      // Store that they've seen the reveal
      localStorage.setItem('ge_revealed', 'true');
      
      // Check if already authenticated
      const isAuthenticated = localStorage.getItem('ge_authenticated');
      
      if (isAuthenticated === 'true') {
        window.location.href = 'hub.html';
      } else {
        window.location.href = 'enter.html';
      }
    }

    // If they've already seen the reveal and are authenticated, redirect to hub
    window.addEventListener('DOMContentLoaded', () => {
      const revealed = localStorage.getItem('ge_revealed');
      const authenticated = localStorage.getItem('ge_authenticated');
      
      // Always show the reveal page on direct navigation to index
      // but make the animation faster if they've seen it before
      if (revealed === 'true') {
        document.querySelector('.reveal-content').style.animationDuration = '0.8s';
        document.querySelector('.tagline').style.animationDuration = '0.8s';
        document.querySelector('.subtitle').style.animationDuration = '0.8s';
        document.querySelector('.enter-btn').style.animationDuration = '0.8s';
      }
    });
  </script>
</body>
</html>
