<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sketch & Guess – G & E</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@900&family=DM+Sans:wght@400;600;700&family=Caveat:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <style>
    .sketch-page {
      padding: var(--spacing-lg);
      max-width: 1000px;
      margin: 0 auto;
    }

    .game-header {
      text-align: center;
      margin-bottom: var(--spacing-lg);
    }

    .game-title {
      font-family: var(--font-display);
      font-size: clamp(2rem, 5vw, 3rem);
      color: var(--cream);
      margin-bottom: var(--spacing-sm);
    }

    .game-status {
      display: flex;
      justify-content: space-around;
      flex-wrap: wrap;
      gap: var(--spacing-md);
      margin-bottom: var(--spacing-lg);
    }

    .status-item {
      background: rgba(245, 237, 224, 0.1);
      border: 2px solid var(--forest);
      border-radius: 8px;
      padding: var(--spacing-sm) var(--spacing-md);
      text-align: center;
    }

    .status-label {
      font-size: 0.85rem;
      color: var(--denim);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .status-value {
      font-family: var(--font-display);
      font-size: 1.5rem;
      color: var(--amber);
      margin-top: 4px;
    }

    .canvas-container {
      background: white;
      border: 4px solid var(--forest);
      border-radius: 8px;
      padding: var(--spacing-md);
      margin-bottom: var(--spacing-lg);
      box-shadow: 0 8px 16px rgba(0, 0, 0, 0.3);
    }

    #drawingCanvas {
      display: block;
      width: 100%;
      border: 2px dashed var(--forest);
      border-radius: 4px;
      cursor: crosshair;
      touch-action: none;
    }

    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: var(--spacing-sm);
      justify-content: center;
      margin-bottom: var(--spacing-lg);
    }

    .color-palette {
      display: flex;
      gap: var(--spacing-xs);
      flex-wrap: wrap;
    }

    .color-btn {
      width: 40px;
      height: 40px;
      border: 3px solid transparent;
      border-radius: 50%;
      cursor: pointer;
      transition: var(--transition-smooth);
    }

    .color-btn:hover {
      transform: scale(1.15);
      border-color: white;
    }

    .color-btn.active {
      border-color: white;
      box-shadow: 0 0 0 2px var(--espresso);
    }

    .brush-sizes {
      display: flex;
      gap: var(--spacing-xs);
    }

    .size-btn {
      width: 40px;
      height: 40px;
      border: 2px solid var(--forest);
      background: var(--cream);
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: var(--transition-smooth);
      font-weight: bold;
      color: var(--espresso);
    }

    .size-btn:hover {
      transform: scale(1.1);
      background: var(--amber);
    }

    .size-btn.active {
      background: var(--amber);
      border-color: var(--amber);
    }

    .tool-btn {
      padding: var(--spacing-sm) var(--spacing-md);
      background: var(--forest);
      color: var(--cream);
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-weight: 600;
      transition: var(--transition-smooth);
    }

    .tool-btn:hover {
      background: var(--amber);
      color: var(--espresso);
      transform: translateY(-2px);
    }

    .word-display {
      background: var(--amber);
      color: var(--espresso);
      padding: var(--spacing-md) var(--spacing-lg);
      border-radius: 8px;
      text-align: center;
      margin-bottom: var(--spacing-lg);
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
    }

    .word-label {
      font-size: 0.9rem;
      font-weight: 600;
      margin-bottom: 4px;
    }

    .current-word {
      font-family: var(--font-display);
      font-size: 2rem;
      font-weight: 900;
    }

    .action-buttons {
      display: flex;
      gap: var(--spacing-md);
      justify-content: center;
      flex-wrap: wrap;
    }

    @media (max-width: 768px) {
      .controls {
        flex-direction: column;
        align-items: stretch;
      }

      .color-palette,
      .brush-sizes {
        justify-content: center;
      }
    }
  </style>
</head>
<body>
  <a href="hub.html" class="nav-back">← Back to Hub</a>

  <div class="sketch-page">
    <div class="game-header">
      <h1 class="game-title">🎨 Sketch & Guess</h1>
      <p style="color: var(--amber); font-family: var(--font-handwritten); font-size: 1.2rem;">
        Practice mode: Draw the word before time runs out!
      </p>
    </div>

    <div class="game-status">
      <div class="status-item">
        <div class="status-label">Round</div>
        <div class="status-value" id="roundNumber">1</div>
      </div>
      <div class="status-item">
        <div class="status-label">Timer</div>
        <div class="status-value" id="timer">60</div>
      </div>
      <div class="status-item">
        <div class="status-label">Score</div>
        <div class="status-value" id="score">0</div>
      </div>
    </div>

    <div class="word-display">
      <div class="word-label">Draw this:</div>
      <div class="current-word" id="currentWord">Click "New Word" to start</div>
    </div>

    <div class="canvas-container">
      <canvas id="drawingCanvas" width="800" height="600"></canvas>
    </div>

    <div class="controls">
      <div class="color-palette" id="colorPalette">
        <!-- Colors will be added by JS -->
      </div>
      <div class="brush-sizes">
        <button class="size-btn" data-size="2" title="Thin">S</button>
        <button class="size-btn active" data-size="5" title="Medium">M</button>
        <button class="size-btn" data-size="10" title="Thick">L</button>
        <button class="size-btn" data-size="20" title="Very Thick">XL</button>
      </div>
      <button class="tool-btn" onclick="clearCanvas()">🗑️ Clear</button>
      <button class="tool-btn" onclick="toggleEraser()">
        <span id="eraserText">✏️ Eraser</span>
      </button>
    </div>

    <div class="action-buttons">
      <button class="btn btn-primary" onclick="newWord()">New Word</button>
      <button class="btn btn-secondary" onclick="skipWord()">Skip</button>
      <button class="btn btn-ghost" onclick="finishRound()">Done Drawing</button>
    </div>
  </div>

  <script src="sketch.js"></script>
</body>
</html>
