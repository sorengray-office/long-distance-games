<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>How Well Do You Know Me? – G & E</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@900&family=DM+Sans:wght@400;600;700&family=Caveat:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <style>
    .knowme-page {
      padding: var(--spacing-lg);
      max-width: 900px;
      margin: 0 auto;
      min-height: 100vh;
    }

    .page-header {
      text-align: center;
      margin-bottom: var(--spacing-xl);
    }

    .page-title {
      font-family: var(--font-display);
      font-size: clamp(2rem, 5vw, 3rem);
      color: var(--cream);
      margin-bottom: var(--spacing-sm);
    }

    .page-subtitle {
      font-family: var(--font-handwritten);
      font-size: 1.3rem;
      color: var(--amber);
    }

    .game-mode-selector {
      display: flex;
      gap: var(--spacing-md);
      justify-content: center;
      margin-bottom: var(--spacing-xl);
      flex-wrap: wrap;
    }

    .mode-btn {
      padding: var(--spacing-md) var(--spacing-lg);
      font-weight: 600;
      border: 3px solid var(--forest);
      border-radius: 8px;
      background: var(--cream);
      color: var(--espresso);
      cursor: pointer;
      transition: var(--transition-smooth);
    }

    .mode-btn:hover {
      transform: translateY(-2px);
      background: var(--amber);
    }

    .mode-btn.active {
      background: var(--forest);
      color: var(--cream);
      transform: scale(1.05);
    }

    .question-container {
      background: var(--cream);
      color: var(--espresso);
      border: 4px solid var(--forest);
      border-radius: 8px;
      padding: var(--spacing-xl);
      margin-bottom: var(--spacing-lg);
      position: relative;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
    }

    .question-number {
      font-size: 0.85rem;
      color: var(--denim);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: var(--spacing-sm);
    }

    .question-text {
      font-family: var(--font-display);
      font-size: 1.8rem;
      margin-bottom: var(--spacing-lg);
      line-height: 1.3;
    }

    .answer-section {
      margin-top: var(--spacing-md);
    }

    .answer-label {
      font-weight: 600;
      margin-bottom: var(--spacing-xs);
      display: block;
      color: var(--forest);
    }

    .answer-input {
      width: 100%;
      padding: var(--spacing-sm);
      font-size: 1rem;
      border: 2px solid var(--forest);
      border-radius: 4px;
      margin-bottom: var(--spacing-md);
      font-family: var(--font-body);
    }

    .answer-input:focus {
      outline: none;
      border-color: var(--amber);
      box-shadow: 0 0 0 3px rgba(196, 136, 58, 0.2);
    }

    .player-answers {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: var(--spacing-md);
      margin-bottom: var(--spacing-lg);
    }

    @media (max-width: 600px) {
      .player-answers {
        grid-template-columns: 1fr;
      }
    }

    .player-answer-box {
      background: rgba(45, 74, 46, 0.1);
      border: 2px solid var(--forest);
      border-radius: 8px;
      padding: var(--spacing-md);
    }

    .player-answer-box.revealed {
      animation: fadeIn 0.5s ease-out;
    }

    .player-answer-box.match {
      background: rgba(111, 191, 74, 0.2);
      border-color: var(--warhead-green);
    }

    .player-answer-box.no-match {
      background: rgba(214, 59, 59, 0.1);
      border-color: var(--popsicle-red);
    }

    .answer-display {
      font-family: var(--font-handwritten);
      font-size: 1.3rem;
      color: var(--espresso);
      margin-top: var(--spacing-xs);
    }

    .action-buttons {
      display: flex;
      gap: var(--spacing-md);
      justify-content: center;
      flex-wrap: wrap;
      margin-top: var(--spacing-lg);
    }

    .score-display {
      text-align: center;
      margin: var(--spacing-xl) 0;
      padding: var(--spacing-lg);
      background: rgba(245, 237, 224, 0.05);
      border: 2px dashed var(--amber);
      border-radius: 8px;
    }

    .score-value {
      font-family: var(--font-display);
      font-size: 3rem;
      color: var(--amber);
    }

    .score-label {
      color: var(--cream);
      margin-top: var(--spacing-sm);
    }

    .match-indicator {
      text-align: center;
      font-size: 3rem;
      margin: var(--spacing-md) 0;
    }

    .game-complete {
      text-align: center;
      padding: var(--spacing-xl);
      background: linear-gradient(145deg, var(--cream) 0%, #EDE5D8 100%);
      border: 4px solid var(--amber);
      border-radius: 8px;
      color: var(--espresso);
      display: none;
    }

    .game-complete.visible {
      display: block;
      animation: fadeIn 0.8s ease-out;
    }

    .complete-title {
      font-family: var(--font-display);
      font-size: 2.5rem;
      color: var(--forest);
      margin-bottom: var(--spacing-md);
    }

    .complete-message {
      font-size: 1.1rem;
      margin-bottom: var(--spacing-lg);
    }
  </style>
</head>
<body>
  <a href="hub.html" class="nav-back">← Back to Hub</a>

  <div class="knowme-page">
    <div class="page-header">
      <h1 class="page-title">🎯 How Well Do You Know Me?</h1>
      <p class="page-subtitle">Put your knowledge to the test!</p>
    </div>

    <div class="game-mode-selector">
      <button class="mode-btn active" onclick="selectMode('local')">
        Local (Same Device)
      </button>
      <button class="mode-btn" onclick="selectMode('remote')">
        Remote (Coming Soon)
      </button>
    </div>

    <div id="gameArea">
      <div class="question-container">
        <div class="question-number" id="questionNumber">Question 1 of 30</div>
        <div class="question-text" id="questionText">
          Loading question...
        </div>

        <div id="inputMode">
          <div class="player-answers">
            <div>
              <label class="answer-label">Ethan's Answer:</label>
              <input type="text" class="answer-input" id="answerE" placeholder="Type your answer...">
            </div>
            <div>
              <label class="answer-label">garrick's Answer:</label>
              <input type="text" class="answer-input" id="answerG" placeholder="Type your answer...">
            </div>
          </div>

          <div class="action-buttons">
            <button class="btn btn-primary" onclick="revealAnswers()">
              Reveal & Compare
            </button>
          </div>
        </div>

        <div id="revealMode" style="display: none;">
          <div class="player-answers">
            <div class="player-answer-box" id="revealE">
              <div class="answer-label">Ethan said:</div>
              <div class="answer-display" id="displayE">—</div>
            </div>
            <div class="player-answer-box" id="revealG">
              <div class="answer-label">garrick said:</div>
              <div class="answer-display" id="displayG">—</div>
            </div>
          </div>

          <div class="match-indicator" id="matchIndicator"></div>

          <div class="action-buttons">
            <button class="btn btn-primary" onclick="nextQuestion()">
              Next Question →
            </button>
            <button class="btn btn-ghost" onclick="resetAnswers()">
              Change Answers
            </button>
          </div>
        </div>
      </div>

      <div class="score-display">
        <div class="score-value" id="scoreDisplay">0</div>
        <div class="score-label">
          Matches so far
        </div>
      </div>
    </div>

    <div class="game-complete" id="gameComplete">
      <div class="complete-title">Game Complete! 🎉</div>
      <div class="complete-message">
        You matched on <strong id="finalScore">0</strong> out of 30 questions!
      </div>
      <div class="complete-message" id="completeMessage">
        <!-- Dynamic message based on score -->
      </div>
      <button class="btn btn-primary" onclick="restartGame()">
        Play Again
      </button>
      <button class="btn btn-secondary" onclick="window.location.href='hub.html'">
        Back to Hub
      </button>
    </div>
  </div>

  <script src="knowme.js"></script>
</body>
</html>
